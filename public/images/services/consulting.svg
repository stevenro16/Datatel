<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1A3C5E"/><stop offset="100%" stop-color="#0d2740"/></linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="12" cy="12" r="1.2" fill="rgba(255,255,255,.07)"/></pattern>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <!-- Whiteboard / screen -->
  <rect x="85" y="45" width="230" height="140" rx="8" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.45)" stroke-width="2"/>
  <!-- Board stand -->
  <rect x="195" y="185" width="10" height="22" rx="2" fill="rgba(255,255,255,.35)"/>
  <rect x="175" y="205" width="50" height="6" rx="3" fill="rgba(255,255,255,.25)"/>
  <!-- Chart bars on board -->
  <rect x="110" y="130" width="22" height="38" rx="3" fill="rgba(46,134,193,.6)" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
  <rect x="140" y="112" width="22" height="56" rx="3" fill="rgba(46,134,193,.8)" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
  <rect x="170" y="100" width="22" height="68" rx="3" fill="#2E86C1" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
  <rect x="200" y="118" width="22" height="50" rx="3" fill="rgba(46,134,193,.7)" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
  <rect x="230" y="90" width="22" height="78" rx="3" fill="#4ade80" opacity=".8" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
  <!-- Trend line over bars -->
  <polyline points="121,125 151,105 181,90 211,108 241,82" fill="none" stroke="rgba(255,255,255,.8)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Trend line dots -->
  <circle cx="121" cy="125" r="4" fill="#fff"/>
  <circle cx="151" cy="105" r="4" fill="#fff"/>
  <circle cx="181" cy="90" r="4" fill="#fff"/>
  <circle cx="211" cy="108" r="4" fill="#fff"/>
  <circle cx="241" cy="82" r="4" fill="#fff"/>
  <!-- Board title text lines -->
  <rect x="105" y="57" width="90" height="6" rx="3" fill="rgba(255,255,255,.45)"/>
  <rect x="105" y="68" width="60" height="4" rx="2" fill="rgba(255,255,255,.2)"/>
  <!-- Person silhouette (presenter) -->
  <circle cx="310" cy="105" r="18" fill="rgba(255,255,255,.18)" stroke="rgba(255,255,255,.45)" stroke-width="2"/>
  <path d="M285 185 Q285 155 310 148 Q335 155 335 185" fill="rgba(255,255,255,.18)" stroke="rgba(255,255,255,.4)" stroke-width="2" stroke-linecap="round"/>
  <!-- Pointer arm -->
  <line x1="295" y1="165" x2="262" y2="148" stroke="rgba(255,255,255,.55)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="258" cy="146" r="4" fill="#2E86C1"/>
  <rect y="248" width="400" height="12" fill="#2E86C1"/>
</svg>
