<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1A3C5E"/><stop offset="100%" stop-color="#0d2740"/></linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="12" cy="12" r="1.2" fill="rgba(255,255,255,.07)"/></pattern>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <!-- Patch panel body -->
  <rect x="60" y="80" width="280" height="60" rx="6" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.4)" stroke-width="1.5"/>
  <!-- Port holes in patch panel -->
  <g fill="rgba(0,0,0,.4)" stroke="rgba(255,255,255,.5)" stroke-width="1">
    <rect x="72"  y="93" width="14" height="10" rx="2"/>
    <rect x="91"  y="93" width="14" height="10" rx="2"/>
    <rect x="110" y="93" width="14" height="10" rx="2"/>
    <rect x="129" y="93" width="14" height="10" rx="2"/>
    <rect x="148" y="93" width="14" height="10" rx="2"/>
    <rect x="167" y="93" width="14" height="10" rx="2"/>
    <rect x="186" y="93" width="14" height="10" rx="2"/>
    <rect x="205" y="93" width="14" height="10" rx="2"/>
    <rect x="224" y="93" width="14" height="10" rx="2"/>
    <rect x="243" y="93" width="14" height="10" rx="2"/>
    <rect x="262" y="93" width="14" height="10" rx="2"/>
    <rect x="281" y="93" width="14" height="10" rx="2"/>
    <rect x="300" y="93" width="14" height="10" rx="2"/>
    <rect x="319" y="93" width="14" height="10" rx="2"/>
  </g>
  <!-- Port labels -->
  <g fill="rgba(255,255,255,.5)" font-size="6" font-family="monospace" text-anchor="middle">
    <text x="79"  y="114">01</text>
    <text x="98"  y="114">02</text>
    <text x="117" y="114">03</text>
    <text x="136" y="114">04</text>
    <text x="155" y="114">05</text>
    <text x="174" y="114">06</text>
    <text x="193" y="114">07</text>
    <text x="212" y="114">08</text>
    <text x="231" y="114">09</text>
    <text x="250" y="114">10</text>
    <text x="269" y="114">11</text>
    <text x="288" y="114">12</text>
    <text x="307" y="114">13</text>
    <text x="326" y="114">14</text>
  </g>
  <!-- Cables dropping down -->
  <g stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M79 140 C79 155 90 158 90 172" stroke="#2E86C1"/>
    <path d="M98 140 C98 155 85 158 85 172" stroke="#facc15"/>
    <path d="M117 140 C117 162 108 165 108 175" stroke="#f87171"/>
    <path d="M136 140 C136 155 148 158 148 172" stroke="#4ade80"/>
    <path d="M155 140 C155 162 162 165 162 175" stroke="#2E86C1"/>
    <path d="M174 140 C174 155 168 158 168 172" stroke="#c084fc"/>
    <path d="M193 140 C193 162 200 165 200 175" stroke="#facc15"/>
    <path d="M212 140 C212 155 220 158 220 172" stroke="#f87171"/>
    <path d="M231 140 C231 162 228 165 228 175" stroke="#4ade80"/>
    <path d="M250 140 C250 155 258 158 258 172" stroke="#2E86C1"/>
    <path d="M269 140 C269 162 275 165 275 175" stroke="#facc15"/>
    <path d="M288 140 C288 155 282 158 282 172" stroke="#c084fc"/>
    <path d="M307 140 C307 162 312 165 312 175" stroke="#f87171"/>
    <path d="M326 140 C326 155 318 158 318 172" stroke="#4ade80"/>
  </g>
  <!-- Cable management bar -->
  <rect x="60" y="172" width="280" height="20" rx="4" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>
  <!-- Cable tray grid lines -->
  <g stroke="rgba(255,255,255,.2)" stroke-width="1">
    <line x1="110" y1="172" x2="110" y2="192"/>
    <line x1="160" y1="172" x2="160" y2="192"/>
    <line x1="210" y1="172" x2="210" y2="192"/>
    <line x1="260" y1="172" x2="260" y2="192"/>
    <line x1="310" y1="172" x2="310" y2="192"/>
  </g>
  <rect y="248" width="400" height="12" fill="#2E86C1"/>
</svg>
