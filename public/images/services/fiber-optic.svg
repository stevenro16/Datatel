<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1A3C5E"/><stop offset="100%" stop-color="#0d2740"/></linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="12" cy="12" r="1.2" fill="rgba(255,255,255,.07)"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <!-- Fiber bundle strands -->
  <g stroke="rgba(255,255,255,.22)" stroke-width="1.5" fill="none">
    <path d="M60 95 Q160 70 240 105 Q310 135 350 120"/>
    <path d="M60 105 Q160 80 240 115 Q310 145 350 130"/>
    <path d="M60 115 Q160 90 240 125 Q310 155 350 140"/>
    <path d="M60 125 Q160 100 240 135 Q310 165 350 150"/>
    <path d="M60 135 Q160 110 240 145 Q310 175 350 160"/>
    <path d="M60 145 Q160 120 240 155 Q310 185 350 170"/>
  </g>
  <!-- Main bright strands -->
  <g stroke="rgba(255,255,255,.85)" stroke-width="2.5" fill="none">
    <path d="M60 110 Q160 85 240 120 Q310 150 350 135"/>
    <path d="M60 125 Q160 100 240 135 Q310 165 350 150"/>
    <path d="M60 140 Q160 115 240 150 Q310 180 350 165"/>
  </g>
  <!-- Light emission points at right -->
  <circle cx="350" cy="135" r="7" fill="#2E86C1" filter="url(#glow)" opacity=".9"/>
  <circle cx="350" cy="150" r="7" fill="#7ec8f0" filter="url(#glow)" opacity=".9"/>
  <circle cx="350" cy="165" r="7" fill="#2E86C1" filter="url(#glow)" opacity=".9"/>
  <circle cx="350" cy="135" r="3.5" fill="#fff"/>
  <circle cx="350" cy="150" r="3.5" fill="#fff"/>
  <circle cx="350" cy="165" r="3.5" fill="#fff"/>
  <!-- Cable connector on left -->
  <rect x="40" y="96" width="22" height="58" rx="4" fill="rgba(255,255,255,.18)" stroke="rgba(255,255,255,.4)" stroke-width="1.5"/>
  <rect x="44" y="102" width="14" height="4" rx="2" fill="rgba(255,255,255,.5)"/>
  <rect x="44" y="110" width="14" height="4" rx="2" fill="rgba(255,255,255,.5)"/>
  <rect x="44" y="118" width="14" height="4" rx="2" fill="rgba(255,255,255,.5)"/>
  <rect x="44" y="126" width="14" height="4" rx="2" fill="rgba(255,255,255,.5)"/>
  <rect x="44" y="134" width="14" height="4" rx="2" fill="rgba(255,255,255,.5)"/>
  <rect x="44" y="142" width="14" height="4" rx="2" fill="rgba(255,255,255,.5)"/>
  <!-- Accent bar -->
  <rect y="248" width="400" height="12" fill="#2E86C1"/>
</svg>
