<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1A3C5E"/><stop offset="100%" stop-color="#0d2740"/></linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="12" cy="12" r="1.2" fill="rgba(255,255,255,.07)"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <!-- Certificate / badge shape -->
  <path d="M200 35 L218 58 L246 58 L232 78 L242 105 L200 93 L158 105 L168 78 L154 58 L182 58 Z"
        fill="rgba(46,134,193,.3)" stroke="rgba(255,255,255,.55)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Star inner -->
  <path d="M200 48 L212 64 L230 64 L219 74 L226 90 L200 80 L174 90 L181 74 L170 64 L188 64 Z"
        fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.25)" stroke-width="1" stroke-linejoin="round"/>
  <!-- Certificate body -->
  <rect x="110" y="108" width="180" height="120" rx="8" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.4)" stroke-width="1.5"/>
  <!-- Certificate lines -->
  <rect x="130" y="126" width="140" height="6" rx="3" fill="rgba(255,255,255,.5)"/>
  <rect x="130" y="140" width="100" height="5" rx="2.5" fill="rgba(255,255,255,.28)"/>
  <rect x="130" y="153" width="120" height="5" rx="2.5" fill="rgba(255,255,255,.28)"/>
  <!-- Big checkmark -->
  <circle cx="200" cy="188" r="24" fill="rgba(46,134,193,.3)" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>
  <path d="M186 188 L196 198 L216 175" stroke="#4ade80" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <!-- Ribbon at bottom of badge -->
  <path d="M177 105 L193 118 L200 112 L207 118 L223 105" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2.5" stroke-linejoin="round"/>
  <rect y="248" width="400" height="12" fill="#2E86C1"/>
</svg>
